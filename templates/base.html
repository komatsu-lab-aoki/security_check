{# templates/base.html #}
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- title -->
  <title>{% block title %}弁護士事務所向け ITリスク・セキュリティ自己診断 | 青木商事{% endblock %}</title>

  <!-- favicon -->
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon.png">

  <!-- meta description -->
  <meta name="description" content="{% block description %}弁護士事務所向けのITリスク・セキュリティ自己診断。端末・データ・ネットワーク・職員ルールまで、5〜15分で事務所のIT運用リスクを整理・可視化します。{% endblock %}">

  <!-- robots -->
  {% if self.robots() %}
    <meta name="robots" content="{{ self.robots() | striptags | trim }}">
  {% else %}
    <meta name="robots" content="index,follow">
  {% endif %}

  <!-- canonical -->
  <link rel="canonical" href="{% block canonical %}{{ request.base_url }}{% endblock %}">

  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">

  <meta property="og:title" content="{% block og_title %}{{ self.title() | striptags | trim }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ self.description() | striptags | trim }}{% endblock %}">
  <meta property="og:url" content="{% block og_url %}{{ self.canonical() | striptags | trim }}{% endblock %}">

  {% block og_image %}
  <meta property="og:image" content="https://security.aokishoji.com/static/og_lawyer_it_risk.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="弁護士事務所向け ITリスク・セキュリティ自己診断">
  {% endblock %}

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ self.title() | striptags | trim }}">
  <meta name="twitter:description" content="{{ self.description() | striptags | trim }}">
  <meta name="twitter:image" content="https://security.aokishoji.com/static/og_lawyer_it_risk.png">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PH7BV2Z1YE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-PH7BV2Z1YE');
  </script>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <a href="{{ url_for('start_lawyer_it_risk') }}" class="header-logo">
          <img src="{{ url_for('static', filename='original.png') }}"
               alt="弁護士事務所向け ITリスク・セキュリティ自己診断｜株式会社青木商事">
        </a>
      </div>

      <div class="header-right">
        <a href="https://aokishoji.com/" target="_blank" rel="noopener" class="header-link">青木商事 トップ</a>
        <a href="https://aokishoji.com/lawoffice" target="_blank" rel="noopener" class="header-link">弁護士事務所IT顧問</a>
        <a href="https://aokishoji.com/contact" target="_blank" rel="noopener" class="header-link">お問い合わせ</a>
      </div>
    </div>

    {% block content %}{% endblock %}

    <div class="hr"></div>
    <div class="note">
      Copyright 2026 Aokishoji Co., Ltd.
      <span style="margin: 0 6px;">/</span>
      提供：株式会社青木商事
    </div>
  </div>
  <script>
    function trackStartDiagnosis(e, placement){
      try {
        e.preventDefault();
        gtag('event', 'start_diagnosis', {
          placement: placement,
          page_path: location.pathname
        });
        setTimeout(function(){ e.target.submit(); }, 150);
      } catch (err) {
        e.target.submit();
      }
    }
  </script>
</body>
</html>
